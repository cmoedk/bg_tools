<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Game Rules — Workspace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="workspace-body">
    <header>
        <h1>🎲 Board Game Rules</h1>
        <div id="image-path-bar" class="image-path-bar"></div>
    </header>

    <!-- Three-pane workspace -->
    <div id="workspace">
        <!-- LEFT: projects grouped by status folder -->
        <aside id="projects" class="pane projects-pane">
            <div id="project-groups"></div>
        </aside>

        <!-- MIDDLE: project info + inline text editor -->
        <section id="editor" class="pane editor-pane">
            <div id="editor-empty" class="pane-empty">
                <p>Select a project on the left, or add one with <strong>+ Add</strong>.</p>
            </div>
            <div id="editor-main" class="editor-main hidden">
                <div class="editor-info">
                    <span id="project-status" class="status-chip"></span>
                    <span id="project-name" class="project-name"></span>
                </div>
                <div class="editor-toolbar">
                    <select id="file-select" class="select" title="Project files"></select>
                    <input id="file-name" type="text" class="name-input" placeholder="filename.md" autocomplete="off">
                    <button id="save-btn">Save</button>
                    <span id="save-status" class="badge"></span>
                </div>
                <textarea id="code" class="code-area" spellcheck="false" placeholder="Select a file…"></textarea>
                <div id="editor-error" class="error"></div>
            </div>
        </section>

        <!-- RIGHT: preview + action menu -->
        <aside id="right" class="pane right-pane">
            <div class="right-section preview-section">
                <div class="section-head">
                    <span>Preview</span>
                    <span id="preview-note" class="muted preview-base"></span>
                </div>
                <div id="preview-host" class="preview-host">
                    <!-- markdown preview -->
                    <iframe id="md-preview" class="md-preview-frame hidden" sandbox="allow-same-origin"></iframe>
                    <!-- card (template) preview, scaled -->
                    <div id="card-stage" class="preview-stage hidden">
                        <div id="preview-scaler" class="preview-scaler">
                            <iframe id="card-preview" class="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
                        </div>
                    </div>
                    <div id="preview-empty" class="pane-empty"><p>No preview for this file type.</p></div>
                </div>
            </div>

            <div class="right-section actions-section">
                <div class="section-head"><span>Actions</span></div>
                <ul id="action-list" class="list"></ul>
                <p id="action-hint" class="muted"></p>
            </div>
        </aside>
    </div>

    <!-- Bottom console drawer (shown while a generator runs) -->
    <section id="console-drawer" class="console-drawer hidden">
        <div class="console-header">
            <h2 id="console-title">Output</h2>
            <div class="console-actions">
                <span id="run-status" class="badge"></span>
                <button id="stop-btn" class="ghost hidden">Stop</button>
                <button id="clear-btn" class="ghost">Clear</button>
                <button id="close-console-btn" class="ghost">Close</button>
            </div>
        </div>
        <pre id="console" class="console"></pre>
        <div id="pdf-results" class="pdf-results hidden">
            <h3>Generated PDFs</h3>
            <ul id="pdf-list" class="pdf-list"></ul>
        </div>
    </section>

    <!-- Reusable modal (Add Project / Promote / Set image path) -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal" role="dialog" aria-modal="true">
            <h2 id="modal-title">Title</h2>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-error" class="error"></div>
            <div class="modal-actions">
                <button id="modal-cancel" class="ghost">Cancel</button>
                <button id="modal-ok">OK</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

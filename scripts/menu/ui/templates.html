<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Templates — Board Game Rules</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="editor-body">
    <header>
        <h1>🧩 Edit Templates <span id="folder-name" class="muted"></span></h1>
        <a href="index.html" class="back-link">← Back to menu</a>
    </header>

    <div id="editor" class="split">
        <!-- Left: editor -->
        <section class="pane editor-pane">
            <div class="editor-toolbar">
                <select id="template-select" class="select"></select>
                <input id="template-name" type="text" class="name-input" placeholder="filename.html" autocomplete="off">
                <button id="save-btn">Save</button>
                <span id="save-status" class="badge"></span>
            </div>
            <div id="editor-notice" class="notice hidden"></div>
            <textarea id="code" class="code-area" spellcheck="false" placeholder="Select or create a template…"></textarea>
            <div id="editor-error" class="error"></div>
        </section>

        <!-- Right: live preview -->
        <section class="pane preview-pane">
            <div class="preview-toolbar">
                <span class="muted">Live preview</span>
                <span id="preview-base" class="muted preview-base"></span>
            </div>
            <div class="preview-stage">
                <div id="preview-scaler" class="preview-scaler">
                    <iframe id="preview" class="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
                </div>
            </div>
        </section>
    </div>

    <script src="templates.js"></script>
</body>
</html>
